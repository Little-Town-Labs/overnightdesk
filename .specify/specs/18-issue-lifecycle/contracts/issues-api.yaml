openapi: 3.0.3
info:
  title: OvernightDesk Engine — Issues API
  version: 1.0.0
  description: Issue CRUD, status lifecycle, and comments endpoints.

paths:
  /api/issues:
    get:
      summary: List issues with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Comma-separated statuses (e.g. "todo,in_progress")
        - name: assignee
          in: query
          schema:
            type: string
          description: Agent ID filter
        - name: priority
          in: query
          schema:
            type: string
            enum: [urgent, high, normal, low]
        - name: source
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Issue list
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Issue'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

    post:
      summary: Create a new issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIssueRequest'
      responses:
        '201':
          description: Issue created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'

  /api/issues/{issueId}:
    get:
      summary: Get issue detail
      description: Accepts either UUID or human identifier (e.g. "OD-42")
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Issue detail with comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueDetail'
        '404':
          description: Issue not found

    put:
      summary: Update issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIssueRequest'
      responses:
        '200':
          description: Issue updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '400':
          description: Invalid status transition
        '404':
          description: Issue not found

    delete:
      summary: Delete issue
      description: Only backlog or todo issues can be deleted.
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Issue deleted
        '400':
          description: Cannot delete active issue
        '404':
          description: Issue not found

  /api/issues/{issueId}/comments:
    get:
      summary: List comments for an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Comments list
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'

    post:
      summary: Add a comment to an issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '404':
          description: Issue not found

components:
  schemas:
    Issue:
      type: object
      properties:
        id:
          type: string
        identifier:
          type: string
          description: Human-readable e.g. "OD-42"
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [backlog, todo, in_progress, in_review, done, failed]
        priority:
          type: string
          enum: [urgent, high, normal, low]
        assignee_agent_id:
          type: string
          nullable: true
        project_id:
          type: string
          nullable: true
        source:
          type: string
        result:
          type: string
          nullable: true
        conversation_id:
          type: string
          nullable: true
        started_at:
          type: string
          nullable: true
          format: date-time
        completed_at:
          type: string
          nullable: true
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IssueDetail:
      allOf:
        - $ref: '#/components/schemas/Issue'
        - type: object
          properties:
            comments:
              type: array
              items:
                $ref: '#/components/schemas/Comment'

    CreateIssueRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
        priority:
          type: string
          enum: [urgent, high, normal, low]
          default: normal
        assignee_agent_id:
          type: string
        source:
          type: string
          default: manual

    UpdateIssueRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        description:
          type: string
        status:
          type: string
          enum: [backlog, todo, in_progress, in_review, done, failed]
        priority:
          type: string
          enum: [urgent, high, normal, low]
        assignee_agent_id:
          type: string
          nullable: true

    Comment:
      type: object
      properties:
        id:
          type: string
        issue_id:
          type: string
        author_agent_id:
          type: string
          nullable: true
        author_source:
          type: string
          enum: [dashboard, telegram, discord, system, agent]
        content:
          type: string
        created_at:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        author_source:
          type: string
          default: dashboard

tools:
  - name: claim_prospect_research_batch
    description: Claim a bounded read-only list of Trevor prospects for deep research, prioritizing missing-email prospects before existing-email refresh candidates.
    input:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 25
          default: 10
    output:
      type: object
      required: [status, items, warnings, outbound_sent]
      properties:
        status: { type: string, enum: [ok] }
        items:
          type: array
          items:
            type: object
            required: [prospect_id, display_name, missing_email, has_public_clue, research_reason]
        warnings:
          type: array
          items: { type: string }
        outbound_sent: { type: boolean, enum: [false] }

  - name: store_prospect_research_evidence
    description: Store bounded public research evidence for one Trevor prospect without updating the prospect email or sending outbound messages.
    input:
      type: object
      required: [prospect_id, source_type]
      properties:
        prospect_id: { type: integer, minimum: 1 }
        research_run_id: { type: integer, minimum: 1 }
        source_type:
          type: string
          enum:
            - official_site
            - contact_page
            - city_directory
            - chamber_directory
            - news_story
            - business_listing
            - rdap_whois
            - other_public_source
        source_url: { type: string, maxLength: 500 }
        source_title: { type: string, maxLength: 300 }
        found_email: { type: string, maxLength: 320 }
        found_phone: { type: string, maxLength: 80 }
        business_context_note: { type: string, maxLength: 1200 }
        search_location_note: { type: string, maxLength: 800 }
        evidence_note: { type: string, maxLength: 1200 }
        confidence:
          type: string
          enum: [official, likely, possible, unknown]
          default: unknown
    output:
      type: object
      required: [status, evidence_id, prospect_id, review_status, email_promotable, warnings, outbound_sent]
      properties:
        status: { type: string, enum: [stored, rejected, not_found] }
        evidence_id: { type: [integer, "null"] }
        prospect_id: { type: integer }
        review_status: { type: string }
        email_promotable: { type: boolean }
        warnings:
          type: array
          items: { type: string }
        outbound_sent: { type: boolean, enum: [false] }

  - name: list_prospect_research_evidence
    description: List bounded research evidence for a prospect or review queue.
    input:
      type: object
      properties:
        prospect_id: { type: integer, minimum: 1 }
        review_status:
          type: string
          enum: [pending_review, approved, rejected, superseded]
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 15
    output:
      type: object
      required: [status, items, warnings, outbound_sent]
      properties:
        status: { type: string, enum: [ok] }
        items:
          type: array
          items:
            type: object
            required: [evidence_id, prospect_id, source_type, confidence, review_status, email_promotable]
        warnings:
          type: array
          items: { type: string }
        outbound_sent: { type: boolean, enum: [false] }

  - name: review_prospect_research_evidence
    description: Review one prospect research evidence row and report controlled promotion eligibility without mutating prospect records.
    input:
      type: object
      required: [evidence_id, review_status, reviewed_by]
      properties:
        evidence_id: { type: integer, minimum: 1 }
        review_status:
          type: string
          enum: [approved, rejected, superseded]
        reviewed_by: { type: string, minLength: 1, maxLength: 120 }
        review_note: { type: string, maxLength: 500 }
    output:
      type: object
      required: [status, evidence_id, prospect_id, review_status, email_promotable, note_promotable, promoted_to, warnings, outbound_sent]
      properties:
        status: { type: string, enum: [reviewed, rejected, not_found] }
        evidence_id: { type: integer }
        prospect_id: { type: [integer, "null"] }
        review_status: { type: [string, "null"] }
        email_promotable: { type: boolean }
        note_promotable: { type: boolean }
        promoted_to:
          type: [string, "null"]
          enum: [email_enrichment_or_prospect_note, prospect_note, null]
        warnings:
          type: array
          items: { type: string }
        outbound_sent: { type: boolean, enum: [false] }

scheduler_templates:
  - name: prospect_weekly_research_jobs
    description: Disabled-by-default weekly jobs for missing-email enrichment and prospect deep research.
    file: tenants/hermes-mitchel/schedules/prospect-weekly-research-jobs.json
    schedule:
      day_of_week: saturday
      time: "23:00"
      timezone: America/Chicago
    defaults:
      enabled: false
      install_status: template_only
      approval_required: true
      outbound_sent: false
    jobs:
      - id: trevor-missing-email-enrichment-weekly
        required_tools:
          - seed_prospect_email_enrichment_queue
          - process_prospect_email_enrichment_batch
          - get_prospect_email_enrichment_summary
      - id: trevor-prospect-deep-research-weekly
        required_tools:
          - claim_prospect_research_batch
          - store_prospect_research_evidence
          - list_prospect_research_evidence

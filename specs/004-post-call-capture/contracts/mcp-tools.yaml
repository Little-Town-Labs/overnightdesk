openapi: 3.1.0
info:
  title: Trevor DB MCP Post-Call Capture Contract
  version: 0.1.0
paths:
  /mcp/generate_post_call_capture:
    post:
      summary: Capture a completed Mitchel prospecting call
      operationId: capture_post_call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task_id:
                  type: integer
                  minimum: 1
                prospect_id:
                  type: integer
                  minimum: 1
                outcome:
                  type: string
                  enum:
                    - no_answer
                    - left_voicemail
                    - interested
                    - quoted
                    - follow_up_later
                    - not_interested
                    - sold
                    - wrong_number
                    - do_not_contact
                summary:
                  type: string
                  maxLength: 2000
                next_action_type:
                  type: string
                  maxLength: 80
                next_action_at:
                  type: string
                  description: ISO date or timestamp for the next action
                agiled_note:
                  type: boolean
                  description: Whether to attempt an Agiled note when the prospect is linked
              oneOf:
                - required: [task_id]
                - required: [prospect_id]
      responses:
        "200":
          description: Capture result or missing-field prompt
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - missing_fields
                  - warnings
                  - outbound_sent
                properties:
                  status:
                    type: string
                    enum: [captured, needs_input, duplicate, not_found]
                  missing_fields:
                    type: array
                    items:
                      type: string
                  interaction_id:
                    type: integer
                    nullable: true
                  prospect_id:
                    type: integer
                    nullable: true
                  task_id:
                    type: integer
                    nullable: true
                  prospect_updates:
                    type: array
                    items:
                      type: string
                  task_status:
                    type: string
                    nullable: true
                    enum: [open, completed, snoozed, discarded]
                  agiled_note:
                    type: object
                    required: [status]
                    properties:
                      status:
                        type: string
                        enum: [created, skipped, failed, not_requested]
                      reference:
                        type: string
                        nullable: true
                      message:
                        type: string
                        nullable: true
                  warnings:
                    type: array
                    items:
                      type: string
                  outbound_sent:
                    type: boolean

model:
  default: "__FROM_PHASE__"
  provider: openrouter
  base_url: "https://openrouter.ai/api/v1"

agent:
  reasoning_effort: medium

delegation:
  provider: openrouter
  model: "x-ai/grok-build-0.1"

memory:
  memory_enabled: true
  user_profile_enabled: true
  provider: memory_tencentdb

display:
  busy_input_mode: queue

mcp_servers:
  agentmail:
    url: "https://mcp.agentmail.to/mcp"
    headers:
      x-api-key: "${AGENTMAIL_API_KEY}"
    skip_preflight: true
    connect_timeout: 60
    timeout: 120

platform_toolsets:
  cli: [hermes-cli]
  teams: [hermes-teams]
  matrix: [hermes-cli]

platforms:
  matrix:
    enabled: false
    extra:
      require_mention: false
      session_scope: room
      auto_thread: false
  teams:
    enabled: false
    extra:
      port: 3978
      allow_all_users: false

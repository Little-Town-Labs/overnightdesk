# === Hermes Provisioner — internal platform service ===
# Deployed to: /opt/overnightdesk/nginx/conf.d/provisioner.conf on aegis-prod
# Proxies to: hermes-provisioner systemd service on host port 8090
# Auth: Bearer token only (no session auth — platform-to-provisioner internal call)
server {
    listen 80;
    server_name provisioner.overnightdesk.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name provisioner.overnightdesk.com;

    ssl_certificate /etc/letsencrypt/live/provisioner.overnightdesk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/provisioner.overnightdesk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location ~ /\. { return 404; }

    # Proxy to hermes-provisioner on the host (172.19.0.1 = Docker bridge gateway)
    location / {
        proxy_pass http://172.19.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }
}

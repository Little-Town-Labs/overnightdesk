# === OvernightDesk — Agent Zero (hermes-agent) ===
# Deployed to: /opt/overnightdesk/nginx/conf.d/default.conf on aegis-prod
# Containers: hermes-agent (gateway :8642), hermes-agent-dashboard (sidecar :9119)
# Auth: nginx auth_request → overnightdesk.com/api/auth/verify-tenant
server {
    listen 80;
    server_name aegis-prod.overnightdesk.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name aegis-prod.overnightdesk.com;

    ssl_certificate /etc/letsencrypt/live/aegis-prod.overnightdesk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aegis-prod.overnightdesk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location ~ /\. { return 404; }

    # Auth subrequest — validates OvernightDesk session + subdomain ownership
    location = /auth-verify {
        internal;
        proxy_pass https://www.overnightdesk.com/api/auth/verify-tenant;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Unauthenticated → sign-in
    location @unauthorized {
        return 302 https://overnightdesk.com/sign-in;
    }

    # Public — called server-side by platform (no session cookie)
    location = /api/status {
        proxy_pass http://hermes-agent:9119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Hermes OpenAI-compatible API — web chat (auth required)
    location /v1/ {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        proxy_pass http://hermes-agent:8642/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Dashboard UI + REST API (auth required)
    location / {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        proxy_pass http://hermes-agent:9119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

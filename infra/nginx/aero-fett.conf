# === Mitchel (aero-fett) — hermes-mitchel ===
# /v1/ uses hermes-native API_SERVER_KEY auth (no session cookie needed for server-side calls)
server {
    listen 80;
    server_name aero-fett.overnightdesk.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name aero-fett.overnightdesk.com;

    ssl_certificate /etc/letsencrypt/live/aero-fett.overnightdesk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aero-fett.overnightdesk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location ~ /\. { return 404; }

    location = /auth-verify {
        internal;
        proxy_pass https://www.overnightdesk.com/api/auth/verify-tenant;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location @unauthorized { return 302 https://overnightdesk.com/sign-in; }

    location = /api/status {
        proxy_pass http://hermes-mitchel:9119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OpenAI-compatible API — hermes-native auth via API_SERVER_KEY (no session cookie)
    location /v1/ {
        proxy_pass http://hermes-mitchel:8642/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location / {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        proxy_pass http://hermes-mitchel:9119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

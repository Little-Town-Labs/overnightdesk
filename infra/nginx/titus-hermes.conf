# Disabled-by-default HTTPS candidate for the existing Titus native dashboard.
# Install only after the canonical projection and public OIDC client verify.
server {
    listen 443 ssl;
    server_name titus-dashboard.overnightdesk.com;

    ssl_certificate /etc/letsencrypt/live/titus-dashboard.overnightdesk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/titus-dashboard.overnightdesk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~ /\. { return 404; }

    location = /auth-verify {
        internal;
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $verify_host "www.overnightdesk.com";
        proxy_pass https://$verify_host/api/auth/verify-tenant;
        proxy_ssl_server_name on;
        proxy_ssl_name www.overnightdesk.com;
        proxy_set_header Host www.overnightdesk.com;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location @unauthorized { return 401; }

    location / {
        auth_request /auth-verify;
        error_page 401 403 = @unauthorized;
        proxy_pass http://hermes-titus:9119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cookie_flags ~^hermes_session_ secure httponly samesite=lax;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

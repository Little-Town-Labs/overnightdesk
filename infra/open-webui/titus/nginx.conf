log_format titus_open_webui_metadata '$remote_addr [$time_local] $request_method $uri $status $body_bytes_sent';
limit_req_zone $binary_remote_addr zone=titus_open_webui_req:10m rate=300r/m;
limit_conn_zone $binary_remote_addr zone=titus_open_webui_conn:10m;
map "$http_upgrade:$http_accept" $titus_open_webui_transport {
    ~*^websocket: websocket;
    ~*text/event-stream sse;
    default http;
}

server {
    listen 80;
    server_name titus-chat.overnightdesk.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name titus-chat.overnightdesk.com;

    ssl_certificate /etc/letsencrypt/live/titus-chat.overnightdesk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/titus-chat.overnightdesk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /dev/stdout titus_open_webui_metadata;
    error_log /dev/stderr warn;
    server_tokens off;
    client_max_body_size 64k;
    limit_conn titus_open_webui_conn 32;
    limit_req zone=titus_open_webui_req burst=120 nodelay;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://overnightdesk.com https://www.overnightdesk.com" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ /\. { return 404; }

    location = /auth-verify {
        internal;
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $verify_host "www.overnightdesk.com";
        proxy_pass https://$verify_host/api/auth/verify-workspace;
        proxy_ssl_server_name on;
        proxy_ssl_name www.overnightdesk.com;
        proxy_set_header Host www.overnightdesk.com;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Open-WebUI-Transport $titus_open_webui_transport;
    }

    location / {
        auth_request /auth-verify;
        proxy_pass http://open-webui-hermes-titus:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-User-Email "";
        proxy_set_header X-User-Name "";
        proxy_set_header X-User-Id "";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

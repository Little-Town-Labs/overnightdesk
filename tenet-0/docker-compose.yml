# Tenet-0 PostgreSQL — dedicated bus database.
# Secrets loaded via `phase run -- docker compose up -d` — see ./deploy.sh.
# The overnightdesk app path in Phase is /tenet0-postgres/.
services:
  tenet0-postgres:
    image: postgres:16-alpine
    container_name: tenet0-postgres
    environment:
      POSTGRES_USER: tenet0_admin
      POSTGRES_DB: tenet0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TENET0_APP_PASSWORD: ${TENET0_APP_PASSWORD}
      TENET0_SECOPS_PASSWORD: ${TENET0_SECOPS_PASSWORD}
    volumes:
      - tenet0-pg-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/migrations:/migrations:ro
    networks:
      - overnightdesk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenet0_admin -d tenet0"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

volumes:
  tenet0-pg-data:

networks:
  overnightdesk:
    external: true
    name: overnightdesk_overnightdesk

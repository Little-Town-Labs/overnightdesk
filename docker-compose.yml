services:
  # Dedicated Postgres for platform orchestrator metadata (Feature 58 / CR-1).
  # NOT shared with any tenant — orchestrator isolation is a constitutional
  # invariant (FR-8). A compromise of the orchestrator plane must not hand
  # an attacker tenant-db access, and vice versa.
  platform-orchestrator-db:
    image: postgres:16-alpine
    container_name: overnightdesk-platform-orchestrator-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=platform_orchestrator
      - POSTGRES_USER=orchestrator
      - POSTGRES_PASSWORD
    volumes:
      - platform-orchestrator-db-data:/var/lib/postgresql/data
    networks:
      - overnightdesk
    expose:
      - "5432"
    cap_drop:
      - ALL
    # postgres:16-alpine entrypoint runs chown/chmod on data dir and
    # /var/run/postgresql at every startup (even existing data). These
    # five caps are the documented minimum for hardened postgres containers.
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
        reservations:
          memory: 128m
          cpus: "0.05"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d platform_orchestrator"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Least-privilege Docker API proxy. Only the specific verbs the
  # orchestrator's DockerProvisioner needs (container CRUD + inspect)
  # are exposed; exec/build/privileged are disabled so a compromised
  # orchestrator cannot escape to the host daemon.
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:0.3.0
    container_name: overnightdesk-docker-socket-proxy
    restart: unless-stopped
    # Hardening: the proxy container holds the keys to the host daemon.
    # Drop every cap it doesn't need and deny privilege escalation. The
    # verb whitelist below is the real access-control boundary; these
    # knobs are defense-in-depth.
    #
    # read_only is NOT set — the entrypoint renders /usr/local/etc/haproxy/
    # haproxy.cfg from a baked-in template at startup. A tmpfs overlay on
    # that directory would mask the template and crash-loop the container.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - IMAGES=1
      - VOLUMES=1
      - INFO=1
      - VERSION=1
      - POST=1   # enables create/start/stop/restart
      - EXEC=0   # orchestrator never needs to docker exec
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - SECRETS=0
      - SERVICES=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=0
    volumes:
      # RW: the proxy forwards POST verbs (ContainerCreate/Start/Stop),
      # which require write access to the socket. The proxy binary itself
      # enforces the verb whitelist — the bind mount is not the gate.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - overnightdesk
    expose:
      - "2375"

  # Platform orchestrator: multi-tenant control plane. Provisions tenant
  # containers, brokers JWT auth for the communication-module, resolves
  # inbound-channel → tenant routes, and runs background maintenance.
  platform-orchestrator:
    build:
      context: /home/ubuntu/overnightdesk-engine
      dockerfile: Dockerfile.orchestrator
      args:
        VERSION: "${ORCHESTRATOR_VERSION:-dev}"
    container_name: overnightdesk-platform-orchestrator
    restart: unless-stopped
    depends_on:
      platform-orchestrator-db:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    environment:
      - LOG_LEVEL
      - ORCHESTRATOR_PORT
      - BIND_ADDRESS
      - DATABASE_URL
      # PHASE_SERVICE_TOKEN is intentionally NOT passed through — it
      # stays on the host shell (see /opt/overnightdesk/start-orchestrator.sh).
      # A pwned orchestrator should not be able to read from Phase.
      # Consequence: config.IsProduction() reports false inside the
      # container; the required-secrets check is skipped. Secrets are
      # still fully injected by `phase run` at compose-up time, so
      # everything the orchestrator needs is present — the cosmetic
      # production=false line in logs is the documented tradeoff.
      # Secrets — injected by Phase at compose-up, passed as plain env.
      - OPERATOR_BOOTSTRAP_TOKEN
      - JWT_SEAL_KEY
      - AUDIT_CHAIN_KEY
      - SERVICE_TOKEN_ROUTE_LOOKUP
      # Tenant provisioning. TENANT_NETWORK is set in the deploy env
      # (see deploy/orchestrator.env.example) so the value is not
      # duplicated between compose and env docs.
      - TENANT_IMAGE_REF
      - TENANT_NETWORK
      - TENANT_MEMORY_BYTES
      - TENANT_PIDS_LIMIT
      # JWT broker settings.
      - JWT_ISSUER
      - JWT_AUDIENCE
      - JWT_TTL
      # Feature flags.
      - DISABLE_LEGACY_BEARER
      # Docker via least-privilege proxy (NOT host socket).
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    networks:
      - overnightdesk
    expose:
      - "8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
        reservations:
          memory: 128m
          cpus: "0.05"

  nginx:
    image: nginx:1.27-alpine
    container_name: overnightdesk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - overnightdesk
    # Short-form depends_on (start-only). nginx may briefly 502 while the
    # orchestrator runs its boot-time migrations on cold start; the
    # restart: unless-stopped + client retries absorb it. Promote to
    # `condition: service_healthy` once the orchestrator gains a health
    # probe that works under distroless (planned follow-up).
    depends_on:
      - platform-orchestrator
    cap_drop:
      - ALL
    # nginx entrypoint chowns /var/cache/nginx (tmpfs, fresh each boot) to
    # UID 101 and binds ports 80/443. These four caps are the minimum required.
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
        reservations:
          memory: 32m
          cpus: "0.05"

  certbot:
    image: certbot/certbot
    container_name: overnightdesk-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  email-fetch:
    build:
      context: /home/ubuntu/email-fetch
      dockerfile: Dockerfile
    container_name: overnightdesk-email-fetch
    profiles:
      - email-fetch
    restart: "no"
    environment:
      - DATABASE_URL
      - EMAIL_ACCOUNTS
      - EMAIL_ADDRESS
      - EMAIL_PASSWORD
      - IMAP_HOST
      - BAT_EMAIL_ADDRESS
      - BAT_EMAIL_PASSWORD
      - BAT_IMAP_HOST
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
      - SERVICE_NAME
    networks:
      - overnightdesk

  overnightdesk-ops:
    build:
      context: /home/ubuntu/overnightdesk-ops
      dockerfile: Dockerfile
    container_name: overnightdesk-ops
    env_file:
      - path: /opt/overnightdesk/overnightdesk-ops.env
        required: false
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      - KNOWLEDGE_DIR=/app/knowledge
      - MCP_PORT=3000
      - WEB_PORT=3001
      # ORCHESTRATOR_DATABASE_URL comes from env_file (overnightdesk-ops.env), not Phase
    networks:
      - overnightdesk
    expose:
      - "3000"
      - "3001"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
        reservations:
          memory: 64m
          cpus: "0.05"

volumes:
  platform-orchestrator-db-data:

networks:
  overnightdesk:
    driver: bridge
